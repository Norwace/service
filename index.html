<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#16181D">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Anleggsservice</title>
<style>
:root{
  --bg:#16181D; --surface:#1F232B; --surface2:#272C36; --line:#2E3440;
  --text:#E9ECF1; --muted:#97A0AD;
  --amber:#E8A33D; --green:#46B873; --red:#E0584F; --blue:#5B8DEF;
  --r:14px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0; padding:0; background:var(--bg); color:var(--text);
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; font-size:16px}
body{padding-bottom:calc(64px + env(safe-area-inset-bottom))}
.wrap{max-width:640px; margin:0 auto; padding:14px 14px 24px}
h1{font-size:20px; font-weight:800; letter-spacing:.3px; margin:6px 0 14px}
h2{font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.8px; color:var(--muted); margin:22px 0 8px}
.mono{font-family:ui-monospace,Menlo,Consolas,monospace}

/* ---------- cards / dashboard ---------- */
.card{background:var(--surface); border:1px solid var(--line); border-radius:var(--r);
  padding:14px; margin-bottom:10px; cursor:pointer}
.card:active{background:var(--surface2)}
.cardtop{display:flex; justify-content:space-between; align-items:baseline; gap:10px}
.cname{font-weight:700; font-size:17px}
.caddr{color:var(--muted); font-size:13px; margin-top:2px}
.pill{font-size:12px; font-weight:700; padding:3px 9px; border-radius:99px; white-space:nowrap; flex-shrink:0}
.p-ok{background:rgba(70,184,115,.15); color:var(--green)}
.p-warn{background:rgba(232,163,61,.15); color:var(--amber)}
.p-over{background:rgba(224,88,79,.18); color:var(--red)}
.p-none{background:rgba(151,160,173,.15); color:var(--muted)}
.gauge{height:6px; background:var(--surface2); border-radius:99px; margin-top:11px; overflow:hidden}
.gauge>div{height:100%; border-radius:99px; transition:width .3s}
.g-ok{background:var(--green)} .g-warn{background:var(--amber)} .g-over{background:var(--red)} .g-none{background:var(--line)}

input,textarea,select{
  width:100%; background:var(--surface2); border:1px solid var(--line); color:var(--text);
  border-radius:10px; padding:11px 12px; font-size:16px; font-family:inherit; margin-top:5px}
textarea{min-height:84px; resize:vertical}
label{display:block; font-size:13px; font-weight:600; color:var(--muted); margin-top:13px}
input:focus,textarea:focus,select:focus,button:focus-visible{outline:2px solid var(--amber); outline-offset:1px}

button{font-family:inherit; cursor:pointer; border:none; border-radius:11px; font-size:15px; font-weight:700}
.btn{background:var(--amber); color:#1A1408; padding:13px 16px; width:100%; margin-top:16px}
.btn2{background:var(--surface2); color:var(--text); border:1px solid var(--line); padding:13px 16px; width:100%; margin-top:10px}
.btn-danger{background:transparent; color:var(--red); border:1px solid rgba(224,88,79,.4); padding:12px 16px; width:100%; margin-top:10px}
.btn-sm{background:var(--surface2); color:var(--text); border:1px solid var(--line); padding:7px 12px; font-size:13px}

.search{margin-bottom:12px}
.fab{position:fixed; right:18px; bottom:calc(78px + env(safe-area-inset-bottom));
  width:56px; height:56px; border-radius:50%; background:var(--amber); color:#1A1408;
  font-size:30px; line-height:0; box-shadow:0 4px 14px rgba(0,0,0,.45); z-index:5}
.empty{color:var(--muted); text-align:center; padding:42px 20px; line-height:1.5}
.banner{background:rgba(232,163,61,.12); border:1px solid rgba(232,163,61,.35); color:var(--amber);
  border-radius:11px; padding:10px 13px; font-size:13.5px; margin-bottom:12px}

/* ---------- detail ---------- */
.topbar{display:flex; align-items:center; gap:8px; margin-bottom:8px}
.back{background:none; color:var(--amber); font-size:15px; padding:8px 8px 8px 0}
.row{display:flex; justify-content:space-between; align-items:center; gap:10px;
  padding:11px 0; border-bottom:1px solid var(--line); font-size:15px}
.row:last-child{border-bottom:none}
.rlabel{color:var(--muted); font-size:13px; flex-shrink:0}
.rval{text-align:right; word-break:break-word}
a.link{color:var(--amber); text-decoration:none; font-weight:600}
.box{background:var(--surface); border:1px solid var(--line); border-radius:var(--r); padding:4px 14px}
.notebox{background:var(--surface); border:1px solid var(--line); border-radius:var(--r);
  padding:13px 14px; font-size:15px; white-space:pre-wrap; word-break:break-word; line-height:1.45}
.hist{padding:11px 0; border-bottom:1px solid var(--line)}
.hist:last-child{border-bottom:none}
.hdate{font-weight:700; font-size:14px}
.hnote{color:var(--muted); font-size:14px; margin-top:3px; white-space:pre-wrap}
.hrow{display:flex; justify-content:space-between; gap:10px; align-items:flex-start}
.del{background:none; color:var(--muted); font-size:18px; padding:0 4px; line-height:1}

/* ---------- calendar ---------- */
.calhead{display:flex; justify-content:space-between; align-items:center; margin:4px 0 10px}
.calhead b{font-size:17px; text-transform:capitalize}
.navbtn{background:var(--surface2); border:1px solid var(--line); color:var(--text);
  width:40px; height:40px; border-radius:10px; font-size:18px}
.calgrid{display:grid; grid-template-columns:repeat(7,1fr); gap:4px}
.dow{text-align:center; font-size:11px; color:var(--muted); font-weight:700; padding:4px 0}
.day{aspect-ratio:1; border-radius:9px; background:var(--surface); border:1px solid var(--line);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;
  font-size:14px; cursor:pointer; position:relative}
.day.out{opacity:.32}
.day.today{border-color:var(--amber)}
.day.sel{background:var(--amber); color:#1A1408; font-weight:800; border-color:var(--amber)}
.dots{display:flex; gap:3px; height:5px}
.dot{width:5px; height:5px; border-radius:50%}
.d-appt{background:var(--blue)} .d-due{background:var(--amber)} .d-over{background:var(--red)}
.day.sel .dot{background:#1A1408}
.agitem{display:flex; gap:10px; align-items:flex-start; padding:11px 0; border-bottom:1px solid var(--line)}
.agitem:last-child{border-bottom:none}
.agdot{width:9px; height:9px; border-radius:50%; margin-top:6px; flex-shrink:0}
.agbody{flex:1}
.agtitle{font-weight:700; font-size:15px}
.agsub{color:var(--muted); font-size:13px; margin-top:2px}

/* ---------- bottom nav ---------- */
.nav{position:fixed; left:0; right:0; bottom:0; background:var(--surface);
  border-top:1px solid var(--line); display:flex; z-index:10;
  padding-bottom:env(safe-area-inset-bottom)}
.nav button{flex:1; background:none; color:var(--muted); padding:11px 0 9px; font-size:12px;
  font-weight:700; display:flex; flex-direction:column; align-items:center; gap:3px; border-radius:0}
.nav button.on{color:var(--amber)}
.nav svg{width:22px; height:22px}

/* ---------- modal sheet ---------- */
.overlay{position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:20; display:flex; align-items:flex-end}
.sheet{background:var(--surface); width:100%; max-width:640px; margin:0 auto;
  border-radius:18px 18px 0 0; padding:18px 16px calc(22px + env(safe-area-inset-bottom));
  max-height:88vh; overflow-y:auto}
.sheet h3{margin:0 0 4px; font-size:18px}
.toast{position:fixed; left:50%; transform:translateX(-50%); bottom:calc(82px + env(safe-area-inset-bottom));
  background:var(--surface2); border:1px solid var(--line); color:var(--text);
  padding:10px 18px; border-radius:99px; font-size:14px; font-weight:600; z-index:30;
  box-shadow:0 4px 14px rgba(0,0,0,.4)}
@media (prefers-reduced-motion: no-preference){
  .sheet{animation:up .18s ease-out}
  @keyframes up{from{transform:translateY(30px); opacity:.6} to{transform:none; opacity:1}}
}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<nav class="nav" id="nav"></nav>
<div id="modal"></div>
<div id="toastbox"></div>

<script>
"use strict";
/* ================= data ================= */
const KEY = "anleggsservice_v1";
let DB = load();
function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if(raw){ const d = JSON.parse(raw);
      return { companies:d.companies||[], appointments:d.appointments||[], memos:d.memos||[], lastExport:d.lastExport||null }; }
  }catch(e){}
  return { companies:[], appointments:[], memos:[], lastExport:null };
}
let _cloudSaveTimer = null;
function save(){
  localStorage.setItem(KEY, JSON.stringify(DB));
  if(window.fbSave && CLOUD){
    clearTimeout(_cloudSaveTimer);
    _cloudSaveTimer = setTimeout(()=>{ try{ window.fbSave(DB); }catch(e){} }, 600);
  }
}
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

/* ---- sky-tilstand (Firebase) ---- */
let CLOUD = false;          // true når innlogget og synk er aktiv
let cloudUser = null;       // {name, email} eller null
// Kalles fra Firebase-modulen når innloggingsstatus endrer seg
window.onAuthChange = function(user){
  cloudUser = user;
  CLOUD = !!user;
  if(view === "backup") renderBackup();
};
// Kalles fra Firebase-modulen når skydata kommer inn (også ved endring fra andre enheter)
window.onCloudData = function(data){
  if(data && (Array.isArray(data.companies))){
    DB = { companies:data.companies||[], appointments:data.appointments||[],
           memos:data.memos||[], lastExport:data.lastExport||null };
    localStorage.setItem(KEY, JSON.stringify(DB));
    render();
  } else {
    // Ingen sky-data enda: hvis vi har lokale data, last dem opp
    const hasLocal = DB.companies.length || DB.memos.length || DB.appointments.length;
    if(hasLocal && window.fbSave){ window.fbSave(DB); toast("Lokale data lastet opp til skyen"); }
  }
};

/* ================= helpers ================= */
const $ = id => document.getElementById(id);
function esc(s){ return (s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function today0(){ const d = new Date(); d.setHours(0,0,0,0); return d; }
function iso(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function fromIso(s){ const [y,m,d] = s.split("-").map(Number); return new Date(y, m-1, d); }
function fmt(s){ if(!s) return ""; const [y,m,d] = s.split("-"); return d+"."+m+"."+y; }
const MND = ["januar","februar","mars","april","mai","juni","juli","august","september","oktober","november","desember"];

function status(c){
  if(!c.lastService) return { key:"none", label:"Ingen service registrert", days:0, pct:0, sort:-0.5 };
  const next = fromIso(c.lastService); next.setDate(next.getDate() + c.intervalWeeks*7);
  const days = Math.round((next - today0()) / 86400000);
  const total = c.intervalWeeks*7;
  const pct = Math.max(2, Math.min(100, ((total-days)/total)*100));
  if(days < 0)  return { key:"over", label: -days + (days===-1?" dag":" dager") + " over fristen", days, pct:100, sort:days, next:iso(next) };
  if(days === 0) return { key:"over", label:"Forfaller i dag", days, pct:100, sort:0, next:iso(next) };
  if(days <= 7) return { key:"warn", label:"Om "+days+(days===1?" dag":" dager"), days, pct, sort:days, next:iso(next) };
  return { key:"ok", label:"Om "+days+" dager", days, pct, sort:days, next:iso(next) };
}
function toast(msg){
  $("toastbox").innerHTML = '<div class="toast">'+esc(msg)+'</div>';
  setTimeout(()=>{ $("toastbox").innerHTML=""; }, 2200);
}

/* ================= state & nav ================= */
let view = "dash";          // dash | detail | cal | backup
let detailId = null;
let calMonth = new Date(); calMonth.setDate(1);
let calSel = iso(today0());
let searchQ = "";

const ICONS = {
  dash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>',
  cal:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>',
  notes:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3h11l3 3v15a0 0 0 010 0H5a0 0 0 010 0V3z"/><path d="M8 8h8M8 12h8M8 16h5"/></svg>',
  backup:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4"/><path d="M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>'
};
function renderNav(){
  const items = [["dash","Dashbord"],["cal","Kalender"],["notes","Notater"],["backup","Backup"]];
  $("nav").innerHTML = items.map(([k,t]) =>
    '<button class="'+((view===k||(k==="dash"&&view==="detail")||(k==="notes"&&view==="memo"))?"on":"")+'" onclick="go(\''+k+'\')">'+ICONS[k]+t+'</button>').join("");
}
function go(v){ searchQ = ""; history.pushState({v:v, d:null}, ""); setView(v); }
function openDetail(id){ history.pushState({v:"detail", d:id}, ""); setView("detail", id); }
function openMemo(id){ history.pushState({v:"memo", d:id}, ""); setView("memo", id); }
function setView(v, d){ view = v; detailId = d || null; render(); window.scrollTo(0,0); }
window.addEventListener("popstate", e => {
  if($("modal").innerHTML){ $("modal").innerHTML = ""; return; }
  const s = e.state || {v:"dash", d:null};
  setView(s.v || "dash", s.d || null);
});

function render(){
  renderNav();
  if(view==="dash") renderDash();
  else if(view==="detail") renderDetail();
  else if(view==="cal") renderCal();
  else if(view==="notes") renderNotes();
  else if(view==="memo") renderMemo();
  else renderBackup();
}

/* ================= dashboard ================= */
function renderDash(){
  let h = "<h1>Dashbord</h1>";
  if(DB.companies.length >= 3){
    const last = DB.lastExport ? (today0() - fromIso(DB.lastExport.slice(0,10)))/86400000 : 999;
    if(last > 30) h += '<div class="banner">Over 30 dager siden forrige backup. Ta en eksport under Backup-fanen.</div>';
  }
  h += '<input class="search" type="search" placeholder="Søk bedrift…" value="'+esc(searchQ)+'" oninput="searchQ=this.value; renderDashList()">';
  h += '<div id="dashlist"></div>';
  h += '<button class="fab" onclick="openCompanyForm()" aria-label="Ny bedrift">+</button>';
  $("app").innerHTML = h;
  renderDashList();
}
function renderDashList(){
  const q = searchQ.trim().toLowerCase();
  let list = DB.companies.filter(c => !q || c.name.toLowerCase().includes(q) || (c.address||"").toLowerCase().includes(q));
  list = list.map(c => ({c, s:status(c)})).sort((a,b) => a.s.sort - b.s.sort);
  if(!DB.companies.length){
    $("dashlist").innerHTML = '<div class="empty">Ingen bedrifter enda.<br>Trykk + for å legge til den første.</div>';
    return;
  }
  if(!list.length){ $("dashlist").innerHTML = '<div class="empty">Ingen treff.</div>'; return; }
  $("dashlist").innerHTML = list.map(({c,s}) =>
    '<div class="card" onclick="openDetail(\''+c.id+'\')">'+
      '<div class="cardtop"><div><div class="cname">'+esc(c.name)+'</div>'+
      '<div class="caddr">Siste service: '+(c.lastService?fmt(c.lastService):"–")+'</div></div>'+
      '<span class="pill p-'+s.key+'">'+s.label+'</span></div>'+
      '<div class="gauge"><div class="g-'+s.key+'" style="width:'+s.pct+'%"></div></div>'+
    '</div>').join("");
}

/* ================= company form (new/edit) ================= */
function openCompanyForm(id){
  history.pushState({modal:1, v:view, d:detailId}, "");
  const c = id ? DB.companies.find(x=>x.id===id) : {};
  const m =
  '<div class="overlay" onclick="if(event.target===this) closeModal()"><div class="sheet">'+
  '<h3>'+(id?"Rediger bedrift":"Ny bedrift")+'</h3>'+
  '<label>Navn *</label><input id="f_name" value="'+esc(c.name||"")+'">'+
  '<label>Adresse</label><input id="f_addr" value="'+esc(c.address||"")+'">'+
  '<label>Kontaktperson</label><input id="f_contact" value="'+esc(c.contact||"")+'">'+
  '<label>Telefon</label><input id="f_phone" type="tel" value="'+esc(c.phone||"")+'">'+
  '<label>Serviceintervall (uker)</label><input id="f_int" type="number" min="1" max="52" value="'+(c.intervalWeeks||6)+'">'+
  '<label>Siste service (valgfritt)</label><input id="f_last" type="date" value="'+(c.lastService||"")+'">'+
  '<label>Notater</label><textarea id="f_notes">'+esc(c.notes||"")+'</textarea>'+
  '<label>Tilgang (koder, nøkkel, åpningstid)</label><textarea id="f_access" class="mono">'+esc(c.access||"")+'</textarea>'+
  '<label>Anlegg / oppsett</label><textarea id="f_equip" placeholder="F.eks. 4 tappekraner, blandgass 70/30, kjøler i kjeller…">'+esc(c.equipment||"")+'</textarea>'+
  '<button class="btn" onclick="saveCompany('+(id?'\''+id+'\'':'null')+')">Lagre</button>'+
  '<button class="btn2" onclick="closeModal()">Avbryt</button>'+
  '</div></div>';
  $("modal").innerHTML = m;
}
function saveCompany(id){
  const name = $("f_name").value.trim();
  if(!name){ toast("Navn må fylles inn"); return; }
  const data = {
    name, address:$("f_addr").value.trim(), contact:$("f_contact").value.trim(),
    phone:$("f_phone").value.trim(),
    intervalWeeks: Math.max(1, parseInt($("f_int").value)||6),
    lastService: $("f_last").value || null,
    equipment:$("f_equip").value.trim(), access:$("f_access").value.trim(), notes:$("f_notes").value.trim()
  };
  if(id){
    const c = DB.companies.find(x=>x.id===id); Object.assign(c, data);
  }else{
    DB.companies.push(Object.assign({id:uid(), history:[]}, data));
  }
  save(); closeModal(); render(); toast("Lagret");
}
function closeModal(){
  if(history.state && history.state.modal) history.back();
  else $("modal").innerHTML = "";
}

/* ================= detail ================= */
function renderDetail(){
  const c = DB.companies.find(x=>x.id===detailId);
  if(!c){ go("dash"); return; }
  const s = status(c);
  const mapsUrl = "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(c.address||c.name);
  let h =
  '<div class="topbar"><button class="back" onclick="go(\'dash\')">‹ Tilbake</button>'+
  '<div style="flex:1"></div><button class="btn-sm" onclick="openCompanyForm(\''+c.id+'\')">Rediger</button></div>'+
  '<h1 style="margin-top:0">'+esc(c.name)+'</h1>'+
  '<div class="box">'+
    (c.address ? '<div class="row"><span class="rlabel">Adresse</span><span class="rval"><a class="link" href="'+mapsUrl+'" target="_blank" rel="noopener">'+esc(c.address)+'</a></span></div>' : "")+
    (c.contact ? '<div class="row"><span class="rlabel">Kontakt</span><span class="rval">'+esc(c.contact)+'</span></div>' : "")+
    (c.phone ? '<div class="row"><span class="rlabel">Telefon</span><span class="rval"><a class="link" href="tel:'+esc(c.phone)+'">'+esc(c.phone)+'</a></span></div>' : "")+
    '<div class="row"><span class="rlabel">Intervall</span><span class="rval">Hver '+c.intervalWeeks+'. uke</span></div>'+
    '<div class="row"><span class="rlabel">Siste service</span><span class="rval">'+(c.lastService?fmt(c.lastService):"–")+'</span></div>'+
    '<div class="row"><span class="rlabel">Neste service</span><span class="rval"><span class="pill p-'+s.key+'">'+(s.next?fmt(s.next)+" · ":"")+s.label+'</span></span></div>'+
  '</div>'+
  '<button class="btn" onclick="openServiceForm(\''+c.id+'\')">Registrer service</button>';

  h += '<h2>Notater</h2>'+sectionBox(c.id, "notes", c.notes, "Trykk for å legge til notat", false);
  h += '<h2>Tilgang</h2>'+sectionBox(c.id, "access", c.access, "Trykk for å legge til tilgangsinfo", true);
  h += '<h2>Anlegg / oppsett</h2>'+sectionBox(c.id, "equipment", c.equipment, "Trykk for å legge til oppsett", false);

  h += '<h2>Servicehistorikk</h2>';
  if(c.history && c.history.length){
    const hist = [...c.history].sort((a,b) => b.date.localeCompare(a.date));
    h += '<div class="box">' + hist.map(e =>
      '<div class="hist"><div class="hrow"><div style="flex:1; cursor:pointer" onclick="openServiceForm(\''+c.id+'\',\''+e.id+'\')"><div class="hdate">'+fmt(e.date)+'</div>'+
      (e.note ? '<div class="hnote">'+esc(e.note)+'</div>' : '<div class="hnote" style="opacity:.6">Trykk for å redigere</div>')+'</div>'+
      '<button class="del" onclick="delHistory(\''+c.id+'\',\''+e.id+'\')" aria-label="Slett">✕</button></div></div>').join("") + '</div>';
  } else {
    h += '<div class="notebox" style="color:var(--muted)">Ingen besøk registrert enda.</div>';
  }
  h += '<button class="btn-danger" onclick="delCompany(\''+c.id+'\')">Slett bedrift</button>';
  $("app").innerHTML = h;
}
function sectionBox(cid, field, val, placeholder, mono){
  const cls = "notebox" + (mono ? " mono" : "");
  const inner = val ? esc(val) : '<span style="color:var(--muted); opacity:.7">'+placeholder+'</span>';
  return '<div class="'+cls+'" style="cursor:pointer" onclick="editField(\''+cid+'\',\''+field+'\')">'+inner+'</div>';
}
const FIELD_META = {

function delCompany(id){

/* ================= calendar ================= */
function dueMap(){
  // map of iso-date -> [{company, overdue}]
  const m = {};
  DB.companies.forEach(c => {
    const s = status(c);
    if(s.next){ (m[s.next] = m[s.next]||[]).push({c, over:s.days<=0}); }
  });
  return m;
}
function renderCal(){
  const y = calMonth.getFullYear(), mo = calMonth.getMonth();
  const due = dueMap();
  const apptDays = {};
  DB.appointments.forEach(a => { (apptDays[a.date] = apptDays[a.date]||[]).push(a); });

  let h = '<h1>Kalender</h1>'+
  '<div class="calhead"><button class="navbtn" onclick="calNav(-1)" aria-label="Forrige måned">‹</button>'+
  '<b>'+MND[mo]+' '+y+'</b>'+
  '<button class="navbtn" onclick="calNav(1)" aria-label="Neste måned">›</button></div>'+
  '<div class="calgrid">'+["M","T","O","T","F","L","S"].map(d=>'<div class="dow">'+d+'</div>').join("");

  const first = new Date(y, mo, 1);
  let startDow = (first.getDay()+6)%7; // mandag=0
  const gridStart = new Date(y, mo, 1-startDow);
  const todayIso = iso(today0());
  for(let i=0;i<42;i++){
    const d = new Date(gridStart); d.setDate(gridStart.getDate()+i);
    const di = iso(d);
    const out = d.getMonth()!==mo;
    let dots = "";
    if(apptDays[di]) dots += '<span class="dot d-appt"></span>';
    if(due[di]) dots += due[di].some(x=>x.over) ? '<span class="dot d-over"></span>' : '<span class="dot d-due"></span>';
    h += '<div class="day'+(out?" out":"")+(di===todayIso?" today":"")+(di===calSel?" sel":"")+'" onclick="calPick(\''+di+'\')">'+
         d.getDate()+'<span class="dots">'+dots+'</span></div>';
  }
  h += '</div>';

  // selected-day agenda
  const selAppts = (apptDays[calSel]||[]).sort((a,b)=>(a.time||"").localeCompare(b.time||""));
  const selDue = due[calSel]||[];
  h += '<h2>'+fmt(calSel)+'</h2><div class="box">';
  if(!selAppts.length && !selDue.length) h += '<div class="row" style="color:var(--muted)">Ingenting denne dagen.</div>';
  selDue.forEach(({c,over}) => {
    h += '<div class="agitem"><span class="agdot" style="background:var(--'+(over?'red':'amber')+')"></span>'+
    '<div class="agbody" onclick="openDetail(\''+c.id+'\')" style="cursor:pointer"><div class="agtitle">Service forfaller: '+esc(c.name)+'</div>'+
    '<div class="agsub">Hver '+c.intervalWeeks+'. uke · trykk for å åpne</div></div></div>';
  });
  selAppts.forEach(a => {
    const comp = a.companyId ? DB.companies.find(x=>x.id===a.companyId) : null;
    const label = (comp ? esc(comp.name)+" – " : "") + esc(a.title) + (a.time ? " · "+a.time : "");
    h += '<div class="agitem"><span class="agdot" style="background:var(--blue)"></span>'+
    '<div class="agbody"><div class="agtitle">'+label+'</div>'+
    (a.note?'<div class="agsub">'+esc(a.note)+'</div>':"")+'</div>'+
    '<button class="del" onclick="delAppt(\''+a.id+'\')" aria-label="Slett">✕</button></div>';
  });
  h += '</div><button class="btn" onclick="openApptForm()">+ Ny avtale '+fmt(calSel)+'</button>';
  $("app").innerHTML = h;
}
function calNav(dir){ calMonth.setMonth(calMonth.getMonth()+dir); renderCal(); }
function calPick(di){ calSel = di; renderCal(); }
function openApptForm(){

/* ================= notater (memos) ================= */
function renderNotes(){
  let h = "<h1>Notater</h1>";
  h += '<input class="search" type="search" placeholder="Søk notat…" value="'+esc(searchQ)+'" oninput="searchQ=this.value; renderMemoList()">';

  h += '<button class="fab" onclick="openMemoForm()" aria-label="Nytt notat">+</button>';

function renderMemoList(){
  const q = searchQ.trim().toLowerCase();
  let list = DB.memos.filter(m => !q || m.title.toLowerCase().includes(q) || (m.body||"").toLowerCase().includes(q));
  list = [...list].sort((a,b) => (b.updated||0) - (a.updated||0));
  if(!DB.memos.length){
    $("memolist").innerHTML = '<div class="empty">Ingen notater enda.<br>Trykk + for å lage det første.</div>';
    return;
  }

  $("memolist").innerHTML = list.map(m => {
    return '<div class="card" onclick="openMemo(\''+m.id+'\')">'+
      '<div class="cname">'+esc(m.title)+'</div>'+
      (m.body ? '<div class="caddr" style="white-space:pre-wrap; margin-top:6px">'+esc(m.body)+'</div>' : "")+
    '</div>';

/* ================= backup ================= */
function cloudSection(){
  const configured = !!localStorage.getItem("fb_config");
  let h = '<h2>Sky / synk</h2>';
  if(!configured){
    h += '<div class="notebox" style="color:var(--muted)">Ikke satt opp enda. Lim inn Firebase-konfigurasjonen for å aktivere sky-synk mellom enheter.</div>'+
    '<button class="btn2" onclick="openCloudSetup()">Sett opp Firebase</button>';
    return h;
  }
  if(!window.fbReady){
    h += '<div class="notebox" style="color:var(--muted)">Firebase er satt opp, men koblingen er ikke klar. Sjekk at du har nett, og prøv å laste appen på nytt.</div>'+
    '<button class="btn2" onclick="openCloudSetup()">Endre Firebase-oppsett</button>';
    return h;
  }
  if(CLOUD && cloudUser){
    h += '<div class="box"><div class="row"><span class="rlabel">Innlogget</span><span class="rval">'+esc(cloudUser.email||cloudUser.name||"")+'</span></div>'+
    '<div class="row"><span class="rlabel">Synk</span><span class="rval" style="color:var(--green)">Aktiv</span></div></div>'+
    '<button class="btn2" onclick="window.fbPushLocal && window.fbPushLocal()">Last lokale data opp til skyen</button>'+
    '<button class="btn-danger" onclick="window.fbSignOut && window.fbSignOut()">Logg ut</button>';
  } else {
    h += '<div class="notebox" style="color:var(--muted)">Logg inn med Google for å synke data til skyen og mellom enheter.</div>'+
    '<button class="btn" onclick="window.fbSignIn && window.fbSignIn()">Logg inn med Google</button>'+
    '<button class="btn2" onclick="openCloudSetup()">Endre Firebase-oppsett</button>';
  }
  return h;
}
function openCloudSetup(){
  history.pushState({modal:1, v:view, d:detailId}, "");
  const cur = localStorage.getItem("fb_config") || "";
  $("modal").innerHTML =
  '<div class="overlay" onclick="if(event.target===this) closeModal()"><div class="sheet">'+
  '<h3>Firebase-oppsett</h3>'+
  '<div class="notebox" style="color:var(--muted); margin-bottom:8px">Lim inn config-objektet fra Firebase-konsollen (Project settings → din web-app). Det ser ut som { apiKey: "…", authDomain: "…", projectId: "…", … }.</div>'+
  '<textarea id="fb_cfg" class="mono" style="min-height:170px" placeholder=\'{ "apiKey": "...", "authDomain": "...", "projectId": "...", "appId": "..." }\'>'+esc(cur)+'</textarea>'+
  '<button class="btn" onclick="saveCloudConfig()">Lagre og last på nytt</button>'+
  '<button class="btn2" onclick="closeModal()">Avbryt</button>'+
  '</div></div>';
}
function saveCloudConfig(){
  let raw = $("fb_cfg").value.trim();
  if(!raw){ toast("Lim inn config først"); return; }
  // tillat at de limer inn "const firebaseConfig = {...};" – plukk ut {...}
  const m = raw.match(/\{[\s\S]*\}/);
  if(!m){ toast("Fant ikke gyldig config"); return; }
  let obj;
  try{
    // tolerer JS-objekt med ufullstendige anførselstegn ved å bruke Function
    obj = (new Function("return ("+m[0]+")"))();
    if(!obj.apiKey || !obj.projectId) throw 0;
  }catch(e){ toast("Ugyldig config"); return; }
  localStorage.setItem("fb_config", JSON.stringify(obj));
  toast("Lagret – laster på nytt");
  setTimeout(()=>location.reload(), 700);
}

function renderBackup(){
  const nServices = DB.companies.reduce((n,c)=>n+(c.history?c.history.length:0),0);
  $("app").innerHTML =
  '<h1>Backup</h1>'+
  cloudSection()+
  '<h2>Status</h2>'+
  '<div class="box">'+
  '<div class="row"><span class="rlabel">Bedrifter</span><span class="rval">'+DB.companies.length+'</span></div>'+
  '<div class="row"><span class="rlabel">Registrerte besøk</span><span class="rval">'+nServices+'</span></div>'+
  '<div class="row"><span class="rlabel">Avtaler</span><span class="rval">'+DB.appointments.length+'</span></div>'+
  '<div class="row"><span class="rlabel">Notater</span><span class="rval">'+DB.memos.length+'</span></div>'+
  '<div class="row"><span class="rlabel">Siste fil-backup</span><span class="rval">'+(DB.lastExport?fmt(DB.lastExport.slice(0,10)):"Aldri")+'</span></div>'+
  '</div>'+
  '<h2>Fil-backup</h2>'+
  '<button class="btn" onclick="exportData()">Last ned backup (fil)</button>'+
  '<button class="btn2" onclick="$(\'importfile\').click()">Importer backup</button>'+
  '<input id="importfile" type="file" accept=".json,application/json" style="display:none" onchange="importData(this)">'+
  '<div class="notebox" style="color:var(--muted); margin-top:12px">Uten sky-synk lagres alt lokalt på denne telefonen. '+
  'Ta fil-backup jevnlig og legg fila i Google Drive. Ved telefonbytte: importer fila på ny telefon.</div>';
}
function exportData(){
  DB.lastExport = iso(today0());
  save();
  const blob = new Blob([JSON.stringify(DB, null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "anleggsservice-backup-" + iso(today0()) + ".json";
  a.click();
  URL.revokeObjectURL(a.href);
  render(); toast("Backup lastet ned");
}
function importData(input){
  const file = input.files[0];
  if(!file) return;
  const r = new FileReader();
  r.onload = () => {
    try{
      const d = JSON.parse(r.result);
      if(!Array.isArray(d.companies)) throw 0;
      if(!confirm("Importere "+d.companies.length+" bedrifter? Dette ERSTATTER alt som ligger i appen nå.")) return;
      DB = { companies:d.companies, appointments:d.appointments||[], memos:d.memos||[], lastExport:d.lastExport||null };
      save(); render(); toast("Backup importert");
    }catch(e){ toast("Ugyldig backupfil"); }
  };
  r.readAsText(file);
  input.value = "";
}

/* ================= init ================= */
history.replaceState({v:"dash", d:null}, "");
render();
if("serviceWorker" in navigator && location.protocol.startsWith("http")){
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}
</script>

<script type="module">
/* ===== Firebase-bro: kjører kun hvis bruker har lagt inn config ===== */
const cfgRaw = localStorage.getItem("fb_config");
if(cfgRaw){
  try{
    const cfg = JSON.parse(cfgRaw);
    const [{ initializeApp }, auth, fs] = await Promise.all([
      import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"),
      import("https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"),
      import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js")
    ]);
    const app = initializeApp(cfg);
    const fbAuth = auth.getAuth(app);
    const db = fs.initializeFirestore(app, {
      localCache: fs.persistentLocalCache({ tabManager: fs.persistentMultipleTabManager() })
    });
    const provider = new auth.GoogleAuthProvider();
    window.fbReady = true;

    let userDocRef = null;
    let unsub = null;

    window.fbSignIn = () => auth.signInWithRedirect(fbAuth, provider);
    window.fbSignOut = async () => {
      if(unsub){ unsub(); unsub = null; }
      await auth.signOut(fbAuth);
    };
    window.fbSave = (data) => {
      if(userDocRef) fs.setDoc(userDocRef, { data, updated: Date.now() });
    };
    window.fbPushLocal = () => {
      if(!userDocRef) return;
      if(!confirm("Laste opp dataene på denne enheten til skyen? Dette overskriver det som ligger i skyen nå.")) return;
      try{ const local = JSON.parse(localStorage.getItem("anleggsservice_v1")); fs.setDoc(userDocRef, { data: local, updated: Date.now() }); }catch(e){}
    };

    // håndter resultat av redirect-innlogging (svelger feil stille)
    auth.getRedirectResult(fbAuth).catch(()=>{});

    auth.onAuthStateChanged(fbAuth, (user) => {
      if(user){
        window.onAuthChange && window.onAuthChange({ name:user.displayName, email:user.email });
        userDocRef = fs.doc(db, "users", user.uid);
        if(unsub) unsub();
        unsub = fs.onSnapshot(userDocRef, (snap) => {
          window.onCloudData && window.onCloudData(snap.exists() ? snap.data().data : null);
        }, (err)=>{ console.warn("snapshot-feil", err); });
      } else {
        window.onAuthChange && window.onAuthChange(null);
        if(unsub){ unsub(); unsub = null; }
        userDocRef = null;
      }
    });
  }catch(e){
    console.warn("Firebase-init feilet", e);
    window.fbReady = false;
  }
}
</script>
